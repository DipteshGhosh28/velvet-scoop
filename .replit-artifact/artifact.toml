kind = "web"
previewPath = "/"
title = "Velvet Scoop"
version = "1.0.0"
id = "artifacts/velvet-scoop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23469

[services.development]
run = "pnpm --filter @workspace/velvet-scoop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/velvet-scoop", "run", "build" ]
publicDir = "artifacts/velvet-scoop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23469"
BASE_PATH = "/"
